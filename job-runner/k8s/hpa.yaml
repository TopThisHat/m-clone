apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-runner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-runner
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: External
    external:
      metric:
        name: pg_job_queue_pending_count
      target:
        type: AverageValue
        averageValue: "100"
